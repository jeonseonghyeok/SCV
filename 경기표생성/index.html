<!DOCTYPE html>

<head>
    <title>경기결과 요약</title>
</head>

<body>
    <div>
        <Table>
            <thead>
                <tr>
                    <th>출석표(입력)</th>
                    <th>경기표(출력)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><textarea id="attendanceList"
                            placeholder="1. 전성혁(실)&#10;2. 강선문(골)&#10;3. 방한결(에)&#10;4. 이정석(골)"></textarea>
                    </td>
                    <td><textarea id="playLIst" readonly></textarea></td>
                </tr>
                <tr>
                    <td>
                        <button id="tbnCalculator" onClick="GameCreate()">경기표 출력</button>
                        <button id="tbnInputClear" onClick="InputClear()">지우기</button>
                    </td>
                </tr>
            </tbody>
        </Table>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">

</body>

</html>
