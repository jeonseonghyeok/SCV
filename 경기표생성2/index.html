<!DOCTYPE html>

<head>
	<meta charset="UTF-8">

    <title>경기표생성</title>
</head>

<body>
    <div id="playerInputDiv" class="group">
        <div class="title">출석표(입력)</div>
	    <textarea id="attendanceList" placeholder="1. 전성혁&#10;2. 강선문&#10;3. 방한결&#10;4. 이정석" >강선문 정상열 노우석 송인혁</textarea>
				
	    <button onClick="GameCreate()">경기 배치</button>
		<button onClick="replaceInput()">띄어쓰기->줄바꿈 변환</button>
    </div>
    
    <div id="GameMatchDiv" class="group" style="display: none;">
	   	<div class="title">티어정보</div>

 		<div class="title">경기 배치</div>
		<div id="seatContainer" class="group">
		</div>
    <button onClick="GameCreate()">랜덤재배치</button>
    <button onClick="gamePrint()">경기표 생성</button>
    </div>
