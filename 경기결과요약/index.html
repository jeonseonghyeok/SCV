<!DOCTYPE html>

<head>
    <title>경기결과 요약</title>
</head>

<body>
    <div>
        <Table>
            <!-- <tr>
            <td>기존 누적 :</td>
            <td></td>
        </tr>
        <tr>
            <td><textarea id="prevInfo" style="width : 96%; height: 200px; margin: 2%;"></textarea></td>
            <td></td>
        </tr> -->
            <thead>
                <tr>
                    <th>경기결과(입력)</th>
                    <th>승리횟수(출력)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><textarea id="playResult"
                            placeholder="1경기 이용대 유연성 (20) VS 최솔규 김원호&#10;2경기 이용대 유연성 VS 최솔규 김원호(9)">1경기 강인호 이현창 (2) VS 김원훈 김민규</textarea>
                    </td>
                    <td><textarea id="winnerSortResult" readonly></textarea></td>
                </tr>
                <tr>
                    <td>
                        <button id="tbnCalculator" onClick="GameResultDecomposition()">경기결과 정리</button>
                        <button id="tbnInputClear" onClick="InputClear()">지우기</button>
                    </td>
                    <td>
                        <a id="saveForm" style="display: none;">
                            
                            <input type="date" id="date">
                            <input type="time" id="time" value="19:30" min="06:00:00" max="22:00:0">
                            <button onClick="GameResultSave()">승리횟수 기록</button>

                        </a>
                    </td>
                </tr>
            </tbody>
        </Table>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">

</body>

</html>
